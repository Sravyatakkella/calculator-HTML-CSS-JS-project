<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111827;
}

.calculator{
    width:420px;
    background:#1f2937;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

#display{
    width:100%;
    height:70px;
    border:none;
    outline:none;
    border-radius:10px;
    margin-bottom:15px;
    padding:15px;
    font-size:2rem;
    text-align:right;
    background:#f3f4f6;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
}

button{
    height:60px;
    border:none;
    border-radius:10px;
    background:#374151;
    color:white;
    font-size:1rem;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#4b5563;
}

.equal{
    background:#2563eb;
}

.equal:hover{
    background:#1d4ed8;
}
</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" disabled>

<div class="buttons">

<button onclick="clearDisplay()">AC</button>
<button onclick="deleteLast()">DEL</button>
<button onclick="appendValue('%')">%</button>
<button onclick="appendValue('(')">(</button>
<button onclick="appendValue(')')">)</button>

<button onclick="appendValue('7')">7</button>
<button onclick="appendValue('8')">8</button>
<button onclick="appendValue('9')">9</button>
<button onclick="appendValue('/')">÷</button>
<button onclick="sqrt()">√</button>

<button onclick="appendValue('4')">4</button>
<button onclick="appendValue('5')">5</button>
<button onclick="appendValue('6')">6</button>
<button onclick="appendValue('*')">×</button>
<button onclick="power()">x²</button>

<button onclick="appendValue('1')">1</button>
<button onclick="appendValue('2')">2</button>
<button onclick="appendValue('3')">3</button>
<button onclick="appendValue('-')">-</button>
<button onclick="cube()">x³</button>

<button onclick="appendValue('0')">0</button>
<button onclick="appendValue('.')">.</button>
<button onclick="calculate()" class="equal">=</button>
<button onclick="appendValue('+')">+</button>
<button onclick="factorial()">x!</button>

<button onclick="sin()">sin</button>
<button onclick="cos()">cos</button>
<button onclick="tan()">tan</button>
<button onclick="log()">log</button>
<button onclick="ln()">ln</button>

<button onclick="pi()">π</button>
<button onclick="euler()">e</button>
<button onclick="inverse()">1/x</button>
<button onclick="abs()">|x|</button>
<button onclick="random()">Rnd</button>

<button onclick="appendValue('Math.pow(')">xʸ</button>
<button onclick="appendValue('Math.cbrt(')">∛x</button>
<button onclick="appendValue('Math.exp(')">eˣ</button>
<button onclick="appendValue('Math.floor(')">floor</button>
<button onclick="appendValue('Math.ceil(')">ceil</button>

</div>
</div>

<script>

const display = document.getElementById("display");

function appendValue(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function deleteLast(){
    display.value = display.value.slice(0,-1);
}

function calculate(){
    try{
        display.value = eval(display.value);
    }
    catch{
        display.value = "Error";
    }
}

function sqrt(){
    display.value = Math.sqrt(eval(display.value));
}

function power(){
    display.value = Math.pow(eval(display.value),2);
}

function cube(){
    display.value = Math.pow(eval(display.value),3);
}

function factorial(){
    let n = eval(display.value);
    let fact = 1;

    for(let i=1;i<=n;i++){
        fact *= i;
    }

    display.value = fact;
}

function sin(){
    display.value = Math.sin(eval(display.value) * Math.PI/180);
}

function cos(){
    display.value = Math.cos(eval(display.value) * Math.PI/180);
}

function tan(){
    display.value = Math.tan(eval(display.value) * Math.PI/180);
}

function log(){
    display.value = Math.log10(eval(display.value));
}

function ln(){
    display.value = Math.log(eval(display.value));
}

function pi(){
    display.value += Math.PI;
}

function euler(){
    display.value += Math.E;
}

function inverse(){
    display.value = 1 / eval(display.value);
}

function abs(){
    display.value = Math.abs(eval(display.value));
}

function random(){
    display.value = Math.random();
}

</script>

</body>
</html>
